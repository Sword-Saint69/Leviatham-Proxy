name: Proxy Checker

on:
  schedule:
    # Runs every 15 minutes
    - cron: "*/15 * * * *"
  workflow_dispatch:  # Allow manual trigger from GitHub UI

permissions:
  contents: write   # Required to commit & push working_proxies.txt

jobs:
  check-proxies:
    name: Fetch & Test Proxies
    runs-on: ubuntu-latest
    timeout-minutes: 55   # Kill job before the next 6-hour cycle

    steps:
      # ── 1. Checkout repo ──────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── 2. Set up Python ──────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # ── 3. Install dependencies ───────────────────────────
      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── 4. Raise file-descriptor limit for 1000 threads ───
      - name: Raise ulimit for high thread count
        run: ulimit -n 65536

      # ── 5. Run proxy checker ──────────────────────────────
      - name: Fetch and test proxies
        run: python proxy_checker.py
        env:
          CI: "true"
          PYTHONUNBUFFERED: "1"

      # ── 6. Show results ───────────────────────────────────
      - name: Show working proxy counts
        run: |
          echo "=== http/google.txt ==="
          echo "Google-verified: $(grep -v '^#' http/google.txt | grep -c '.' || true)"
          echo ""
          echo "=== http/httpbin.txt ==="
          echo "HttpBin-verified: $(grep -v '^#' http/httpbin.txt | grep -c '.' || true)"
          echo ""
          echo "=== socks5/working.txt ==="
          echo "SOCKS5 working: $(grep -v '^#' socks5/working.txt | grep -c '.' || true)"
          echo ""
          echo "--- Sample (Google) ---"
          grep -v '^#' http/google.txt | head -10 || true
          echo "--- Sample (HttpBin) ---"
          grep -v '^#' http/httpbin.txt | head -10 || true
          echo "--- Sample (SOCKS5) ---"
          grep -v '^#' socks5/working.txt | head -10 || true

      # ── 7. Commit & push all output files ─────────────────
      - name: Commit updated proxy lists
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add http/ socks5/ index.html
          # Only commit if there are actual changes
          if git diff --cached --quiet; then
            echo "No changes to proxy lists — skipping commit."
          else
            G=$(grep -v '^#' http/google.txt  | grep -c '.' || echo 0)
            H=$(grep -v '^#' http/httpbin.txt | grep -c '.' || echo 0)
            S=$(grep -v '^#' socks5/working.txt | grep -c '.' || echo 0)
            git commit -m "chore: update proxies [G:${G} HB:${H} S5:${S}] $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi
