name: Proxy Checker

on:
  schedule:
    # Runs every 6 hours (GitHub Actions minimum reliable cadence)
    - cron: "0 */6 * * *"
  workflow_dispatch:  # Allow manual trigger from GitHub UI

permissions:
  contents: write   # Required to commit & push working_proxies.txt

jobs:
  check-proxies:
    name: Fetch & Test Proxies
    runs-on: ubuntu-latest
    timeout-minutes: 55   # Kill job before the next 6-hour cycle

    steps:
      # ── 1. Checkout repo ──────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── 2. Set up Python ──────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # ── 3. Install dependencies ───────────────────────────
      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── 4. Raise file-descriptor limit for 500 threads ────
      - name: Raise ulimit for high thread count
        run: ulimit -n 65536

      # ── 5. Run proxy checker ──────────────────────────────
      - name: Fetch and test proxies
        run: python proxy_checker.py
        env:
          CI: "true"
          PYTHONUNBUFFERED: "1"

      # ── 6. Show results ───────────────────────────────────
      - name: Show working proxy count
        run: |
          echo "=== working_proxies.txt ==="
          echo "Total lines: $(wc -l < working_proxies.txt)"
          echo "Working proxies: $(grep -v '^#' working_proxies.txt | grep -c '.' || true)"
          echo ""
          echo "First 20 proxies:"
          grep -v '^#' working_proxies.txt | head -20 || true

      # ── 7. Commit & push updated list ─────────────────────
      - name: Commit updated proxy list
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add working_proxies.txt
          # Only commit if there are actual changes
          if git diff --cached --quiet; then
            echo "No changes to proxy list — skipping commit."
          else
            PROXY_COUNT=$(grep -v '^#' working_proxies.txt | grep -c '.' || echo 0)
            git commit -m "chore: update proxies [${PROXY_COUNT} working] $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi
